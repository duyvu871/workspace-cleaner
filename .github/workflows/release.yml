# Build installers on Linux, Windows, macOS and attach them to a GitHub Release.
# Trigger: push a tag like v1.2.3 (after bumping version in package.json).
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # 22.04: reliable libfuse2 for AppImage tooling used by electron-builder
          - os: ubuntu-22.04
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfuse2

      - run: npm ci

      - run: npm run build

      - name: Pack (Linux — AppImage + deb)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish never

      - name: Pack (Windows — NSIS)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish never

      - name: Pack (macOS — DMG)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: release/
          if-no-files-found: error

  github-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release files
        run: find dist -type f -print

      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
