# Cấu hình đóng gói — electron-builder tự đọc file này ở thư mục gốc project.
# Tài liệu: https://www.electron.build/configuration

appId: dev.tools.workspace-cleaner
productName: Workspace Cleaner

# Icon cho .exe / .dmg / AppImage / .deb — PNG ≥512px (electron-builder tự tạo .ico / .icns khi cần)
icon: public/logo.png

directories:
  output: release

files:
  - out/**/*
  - package.json

linux:
  target:
    - AppImage
    - deb
  category: Utility
  # Bắt buộc cho .deb (maintainer); đổi email nếu bạn dùng địa chỉ thật
  maintainer: duyvu871 <duyvu871@users.noreply.github.com>

mac:
  target: dmg
  category: public.app-category.utilities

win:
  target: nsis
  artifactName: "${productName}-Setup-${version}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

# GitHub Releases: GH_TOKEN / GITHUB_TOKEN + npm run publish (or CI).
# Draft vs published: publish.releaseType. Release body text: releaseInfo (not under publish — v26 schema).
releaseInfo:
  releaseNotesFile: release-notes.md

publish:
  provider: github
  releaseType: draft
