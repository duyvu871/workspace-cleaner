# Cấu hình đóng gói — electron-builder tự đọc file này ở thư mục gốc project.
# Tài liệu: https://www.electron.build/configuration

appId: dev.tools.workspace-cleaner
productName: Workspace Cleaner

# Icon cho .exe / .dmg / AppImage / .deb — PNG ≥512px (electron-builder tự tạo .ico / .icns khi cần)
icon: public/logo.png

directories:
  output: release

files:
  - out/**/*
  - package.json

afterAllArtifactBuild: scripts/after-all-artifact-build.cjs

linux:
  target:
    - AppImage
    - deb
  category: Utility
  # Bắt buộc cho .deb (maintainer); đổi email nếu bạn dùng địa chỉ thật
  maintainer: duyvu871 <duyvu871@users.noreply.github.com>

mac:
  target: dmg
  category: public.app-category.utilities

win:
  target: nsis
  artifactName: "${productName}-Setup-${version}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

# Đăng lên GitHub Releases khi chạy: GH_TOKEN=… npm run publish (hoặc CI)
# releaseType: draft → bản nháp; mở Releases trên GitHub rồi Publish release
publish:
  provider: github
  releaseType: draft
